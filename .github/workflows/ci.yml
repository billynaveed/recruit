name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Placeholder values so prisma generate / typecheck / build can run without a
    # real database or secrets. They only need to be present, not valid.
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/recruit
      SESSION_SECRET: build-time-placeholder-secret-at-least-32-chars
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
